<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABGB - Sistema de Órdenes Mesero</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="mesero.css">
</head>
<body>
    <div class="app">
        <!-- HEADER -->
        <header class="header">
            <div class="header-content">
                <div class="header-left">
                    <div class="logo">AB</div>
                    <div>
                        <h1>Mesero</h1>
                        <span class="time" id="time">09:30</span>
                    </div>
                </div>
                <button class="btn-logout" id="btnLogout">Cerrar Sesión</button>
            </div>
        </header>

        <!-- MAIN -->
        <main class="main">
            <div class="container">
                <!-- PANEL IZQUIERDO: MENÚ -->
                <section class="menu-panel">
                    <div class="panel-header">
                        <h2>Tomar Orden</h2>
                    </div>

                    <div class="search-box">
                        <input type="text" id="searchInput" placeholder="Buscar producto...">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.35-4.35"></path>
                        </svg>
                    </div>

                    <div class="filters">
                        <button class="filter-btn active" data-category="all">Todos</button>
                        <button class="filter-btn" data-category="burgers">Angus</button>
                        <button class="filter-btn" data-category="chicken">Pollo</button>
                        <button class="filter-btn" data-category="combos">Smashed</button>
                        <button class="filter-btn" data-category="sides">Acompañamientos</button>
                        <button class="filter-btn" data-category="bebidas">Bebidas</button>
                    </div>

                    <div class="products-list" id="productsList">
                        <!-- Los productos se cargan aquí -->
                    </div>
                </section>

                <!-- PANEL DERECHO: ORDEN Y MESAS -->
                <aside class="order-panel">
                    <!-- SELECTOR DE MESAS -->
                    <div class="card">
                        <h3>Seleccionar Mesa</h3>
                        <div class="tables-grid">
                            <button class="table-btn" data-table="1">1</button>
                            <button class="table-btn" data-table="2">2</button>
                            <button class="table-btn" data-table="3">3</button>
                            <button class="table-btn" data-table="4">4</button>
                            <button class="table-btn" data-table="5">5</button>
                            <button class="table-btn" data-table="6">6</button>
                        </div>
                    </div>

                    <!-- CARRITO/ORDEN -->
                    <div class="card order-card">
                        <div class="card-header">
                            <h3>Orden Actual</h3>
                            <span class="table-badge" id="tableBadge">-</span>
                        </div>

                        <div class="order-items" id="orderItems">
                            <div class="empty-message">Selecciona productos</div>
                        </div>

                        <div class="order-summary">
                            <div class="summary-row">
                                <span>Subtotal</span>
                                <span id="subtotal">₡0</span>
                            </div>
                            <div class="summary-row">
                                <span>Impuesto 13%</span>
                                <span id="tax">₡0</span>
                            </div>
                            <div class="summary-row total">
                                <span>Total</span>
                                <span id="total">₡0</span>
                            </div>
                        </div>

                        <button class="btn-confirm" id="btnConfirm" disabled>Confirmar Orden</button>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <!-- MODAL INSTRUCCIONES ESPECIALES -->
    <div class="modal" id="modalInstrucciones" style="display: none;">
        <div class="modal-overlay" id="modalOverlay"></div>
        <div class="modal-content">
            <div class="modal-header">
                <h2>Instrucciones Especiales</h2>
                <button class="modal-close" id="btnCloseModal">&times;</button>
            </div>
            <div class="modal-body">
                <p class="product-name" id="modalProductName"></p>
                
                <div class="instructions-group">
                    <label class="instruction-item">
                        <input type="checkbox" value="Sin cebolla" class="instruction-check">
                        <span>Sin cebolla</span>
                    </label>
                    <label class="instruction-item">
                        <input type="checkbox" value="Sin tomate" class="instruction-check">
                        <span>Sin tomate</span>
                    </label>
                    <label class="instruction-item">
                        <input type="checkbox" value="Sin lechuga" class="instruction-check">
                        <span>Sin lechuga</span>
                    </label>
                    <label class="instruction-item">
                        <input type="checkbox" value="Sin mayonesa" class="instruction-check">
                        <span>Sin mayonesa</span>
                    </label>
                    <label class="instruction-item">
                        <input type="checkbox" value="Picante" class="instruction-check">
                        <span>Picante</span>
                    </label>
                    <label class="instruction-item">
                        <input type="checkbox" value="Doble queso" class="instruction-check">
                        <span>Doble queso</span>
                    </label>
                </div>

                <textarea id="customInstructions" placeholder="Instrucciones adicionales..." class="custom-instructions"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="btnCancelModal">Cancelar</button>
                <button class="btn-primary" id="btnSaveInstructions">Guardar</button>
            </div>
        </div>
    </div>

    <script src="mesero.js"></script>
</body>
</html>
